# Redis persistence tuned for the bot's session + OAuth-token storage.
# We keep periodic RDB snapshots and enable AOF with mixed preambles so Redis
# can recover quickly while still minimizing recent-write loss.

dir /data

save 900 1
save 300 10
save 60 10000

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
aof-use-rdb-preamble yes

auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
